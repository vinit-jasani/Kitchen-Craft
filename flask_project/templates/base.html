<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KitchenCraft - Premium Cost Estimator{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Apple Premium Aesthetics */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-color: #F5F5F7;
            --card-color: #FFFFFF;
            --text-primary: #1D1D1F;
            --text-secondary: #6E6E73;
            --primary-blue: #0071E3;
            --border-color: #D2D2D7;
            --success-color: #34C759;
            --error-color: #FF3B30;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            letter-spacing: -0.011em;
            padding-bottom: 60px;
        }

        .apple-navbar {
            background-color: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(210, 210, 215, 0.4);
            transition: all 0.3s;
        }

        .apple-card {
            background: var(--card-color);
            border: 1px solid rgba(210, 210, 215, 0.6);
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.015);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .apple-card:hover {
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.03);
            border-color: rgba(210, 210, 215, 0.8);
        }

        .btn-apple-primary {
            background-color: var(--primary-blue);
            color: #FFFFFF;
            font-weight: 600;
            border-radius: 14px;
            padding: 10px 24px;
            border: none;
            transition: all 0.2s;
        }

        .btn-apple-primary:hover {
            background-color: #0077ED;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.2);
        }

        .btn-apple-secondary {
            background-color: #E8E8ED;
            color: var(--text-primary);
            font-weight: 600;
            border-radius: 14px;
            padding: 10px 24px;
            border: none;
            transition: all 0.2s;
        }

        .btn-apple-secondary:hover {
            background-color: #D2D2D7;
        }

        .form-control, .form-select {
            background-color: #F5F5F7;
            border: 1px solid transparent;
            border-radius: 14px;
            padding: 11px 16px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .form-control:focus, .form-select:focus {
            background-color: #FFFFFF;
            border-color: var(--primary-blue);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <nav className="navbar navbar-expand-lg navbar-light fixed-top apple-navbar py-2 px-3">
        <div className="container-fluid max-w-7xl">
            <a className="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('dashboard') }}">
                <span className="bg-primary text-white d-flex align-items-center justify-content-center rounded-3" style="width: 38px; height: 38px; background-color: var(--primary-blue) !important;">
                    <i className="fa-solid fa-kitchen-set"></i>
                </span>
                <div>
                    <strong className="text-dark tracking-tight d-block" style="font-size: 1.1rem; line-height: 1;">KitchenCraft</strong>
                    <span className="text-uppercase text-muted font-bold" style="font-size: 9px; letter-spacing: 1px; font-weight: 700;">Modular Studio</span>
                </div>
            </a>
            
            {% if session.get('user') %}
            <button className="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i className="fa-solid fa-bars"></i>
            </button>
            <div className="collapse navbar-collapse" id="navbarNav">
                <ul className="navbar-nav mx-auto gap-1 my-2 my-lg-0">
                    <li className="nav-item">
                        <a className="nav-link px-3 py-2 rounded-pill font-semibold {% if request.path == '/dashboard' %}bg-primary text-white{% else %}text-muted{% endif %}" href="{{ url_for('dashboard') }}">
                            <i className="fa-solid fa-chart-pie me-1.5"></i> Dashboard
                        </a>
                    </li>
                    <li className="nav-item">
                        <a className="nav-link px-3 py-2 rounded-pill font-semibold {% if request.path == '/customers' %}bg-primary text-white{% else %}text-muted{% endif %}" href="{{ url_for('customers') }}">
                            <i className="fa-solid fa-users me-1.5"></i> Customers
                        </a>
                    </li>
                    <li className="nav-item">
                        <a className="nav-link px-3 py-2 rounded-pill font-semibold {% if request.path == '/materials' %}bg-primary text-white{% else %}text-muted{% endif %}" href="{{ url_for('materials') }}">
                            <i className="fa-solid fa-tag me-1.5"></i> Materials
                        </a>
                    </li>
                    <li className="nav-item">
                        <a className="nav-link px-3 py-2 rounded-pill font-semibold {% if request.path == '/estimate' %}bg-primary text-white{% else %}text-muted{% endif %}" href="{{ url_for('estimate') }}">
                            <i className="fa-solid fa-calculator me-1.5"></i> Estimate Studio
                        </a>
                    </li>
                    <li className="nav-item">
                        <a className="nav-link px-3 py-2 rounded-pill font-semibold {% if request.path == '/history' %}bg-primary text-white{% else %}text-muted{% endif %}" href="{{ url_for('history') }}">
                            <i className="fa-solid fa-history me-1.5"></i> History
                        </a>
                    </li>
                </ul>
                <div className="d-flex align-items-center gap-3">
                    <div className="d-none d-sm-flex align-items-center gap-2 bg-light px-3 py-1.5 rounded-pill border">
                        <i className="fa-solid fa-user-shield text-primary" style="color: var(--primary-blue) !important;"></i>
                        <span className="small font-semibold">Admin</span>
                    </div>
                    <a className="btn btn-outline-danger border-0 rounded-3 px-3 py-2" href="{{ url_for('logout') }}" title="Sign Out">
                        <i className="fa-solid fa-sign-out-alt"></i>
                    </a>
                </div>
            </div>
            {% endif %}
        </div>
    </nav>

    <!-- Main Content Grid -->
    <main className="container-fluid max-w-7xl px-4 mt-5 pt-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
